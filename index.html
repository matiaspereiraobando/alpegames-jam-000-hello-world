<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alpe Games - Jam #0</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      background: #0b0b12;
      color: #d9d9e6;
      font-family: "Courier New", monospace;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .wrap {
      text-align: center;
      padding: 1rem;
    }
    canvas {
      width: 800px;
      height: 600px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 4px solid #39395a;
      box-shadow: 0 0 0 4px #1a1a2b, 0 16px 40px rgba(0, 0, 0, .5);
      background: #000;
      max-width: calc(100vw - 2rem);
      max-height: calc(100vh - 8rem);
    }
    .hint {
      margin-top: .7rem;
      opacity: .8;
      font-size: .85rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="canvas" width="800" height="600"></canvas>
    <div class="hint">If the game does not start, make sure love.js build outputs (game.js/game.wasm/game.data) are in this folder.</div>
  </div>

  <script>
    var Module = {
      canvas: document.getElementById('canvas'),
      arguments: [],
      print: function(text) { console.log(text); },
      printErr: function(text) { console.error(text); }
    };
  </script>
  <script src="game.js"></script>
</body>
</html>
